<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#1c1c1c" />
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <title>KZ Café Lounge | Bardo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <header class="hero">
    <div class="hero-card">
      <img class="hero-emblem" src="logo-kz.png" alt="KZ Café Lounge" width="104" height="126" />
      <p class="eyebrow">Bardo · Tunis</p>
      <h1>KZ Café Lounge</h1>
      <p class="hero-text">Café · Lounge · Restaurant</p>
    </div>
  </header>

  <nav class="category-nav">
    <div id="categoryNav" class="nav-pills"></div>
  </nav>
  <div class="search-bar-wrapper">
  <div class="search-bar">
    <i class="fa-solid fa-magnifying-glass search-icon"></i>
    <input type="text" id="searchInput" placeholder="Rechercher un article..." />
  </div>
</div>
<div class="floating-cart" id="floatingCart" onclick="window.location.href='cart.html'" style="display:none">
  <i class="fa-solid fa-basket-shopping"></i>
  <span id="cartBadge">0</span>
</div>
<a class="floating-track" id="floatingTrack" href="track.html" style="display:none">
  <i class="fa-solid fa-location-arrow"></i>
  <span>Suivre ma commande</span>
</a>
  <main class="container">
    <section class="section" id="menu">
      <div id="menuContainer"></div>
    </section>

    <section class="section">
      <div class="section-head">
        <h2>Nous trouver</h2>
      </div>
      <div class="map-card">
        <!-- Place-search embed for KZ Café Lounge, Bardo (location confirmed by client). -->
        <iframe
          src="https://maps.google.com/maps?q=KZ%20Caf%C3%A9%20Lounge%20Bardo%20Tunis&t=&z=14&ie=UTF8&iwloc=&output=embed"
          class="map-frame" allowfullscreen="" loading="lazy"
          referrerpolicy="no-referrer-when-downgrade"></iframe>
      </div>
    </section>

    <section class="section">
      <div class="section-head">
        <h2>Contact</h2>
      </div>
      <div class="info-card">
        <p><strong>Téléphone :</strong> <a href="tel:+21658890656">+216 58 890 656</a></p>
        <p><strong>Horaires :</strong> Tous les jours, 08:00 – 00:00</p>
        <div class="social-links">
          <a href="https://www.instagram.com/kzed_cafelounge/" class="social-btn instagram-btn" target="_blank" rel="noopener">
            <i class="fa-brands fa-instagram"></i>
            Instagram
          </a>
          <a href="https://www.facebook.com/profile.php?id=61559121256736" class="social-btn facebook-btn" target="_blank" rel="noopener">
            <i class="fa-brands fa-facebook"></i>
            Facebook
          </a>
        </div>
      </div>
    </section>
  </main>

  <script src="menu-data.js"></script>
  <script src="supabase.js"></script>
  <script src="script.js"></script>
</body>
</html>
