<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0d1117" />
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <link rel="apple-touch-icon" href="icon.svg" />
  <title>KZ | POS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link rel="stylesheet" href="pos.css" />
</head>
<body class="pos-body">

  <div class="pos-shell">


    <div class="pos-topbar">
      <div class="pos-brand">
        <strong>KZ Café Lounge</strong>
        <span>Dashboard commandes</span>
      </div>
      <div class="pos-right">
        <a class="pos-link" href="report.html"><i class="fa-solid fa-chart-line"></i> Rapport</a>
        <a class="pos-link" href="admin.html"><i class="fa-solid fa-sliders"></i> Menu</a>
        <span id="currentTime" class="pos-time"></span>
        <button class="pos-logout" onclick="logout()"><i class="fa-solid fa-right-from-bracket"></i></button>
      </div>
    </div>


    <div class="stats-bar">
      <div class="stat-card">
        <span class="stat-label">En attente</span>
        <span class="stat-value" id="statPending">0</span>
      </div>
      <div class="stat-card">
        <span class="stat-label">En préparation</span>
        <span class="stat-value" id="statPreparing">0</span>
      </div>
      <div class="stat-card">
        <span class="stat-label">Terminées aujourd'hui</span>
        <span class="stat-value" id="statDone">0</span>
      </div>
      <div class="stat-card">
        <span class="stat-label">Annulées</span>
        <span class="stat-value" id="statCancelled">0</span>
      </div>
      <div class="stat-card highlight">
        <span class="stat-label">CA du jour</span>
        <span class="stat-value" id="statRevenue">0.00 DT</span>
      </div>
    </div>


    <div class="filter-tabs">
      <button class="filter-tab active" data-filter="pending" onclick="setFilter('pending')">
        <i class="fa-solid fa-clock"></i> En attente
        <span class="tab-badge" id="badgePending">0</span>
      </button>
      <button class="filter-tab" data-filter="preparing" onclick="setFilter('preparing')">
        <i class="fa-solid fa-fire-burner"></i> En préparation
        <span class="tab-badge" id="badgePreparing">0</span>
      </button>
      <button class="filter-tab" data-filter="done" onclick="setFilter('done')">
        <i class="fa-solid fa-check"></i> Terminées
      </button>
      <button class="filter-tab" data-filter="cancelled" onclick="setFilter('cancelled')">
        <i class="fa-solid fa-xmark"></i> Annulées
      </button>
      <button class="filter-tab" data-filter="all" onclick="setFilter('all')">
        <i class="fa-solid fa-list"></i> Tout
      </button>
    </div>


    <div id="posOrders" class="pos-orders">
      <p class="empty-pos">Aucune commande en attente.</p>
    </div>

  </div>

  <!-- Edit-order modal -->
  <div class="edit-overlay" id="editOverlay" hidden>
    <div class="edit-modal">
      <div class="edit-head">
        <h3><i class="fa-solid fa-pen-to-square"></i> Modifier — Table <span id="editTableNum"></span></h3>
        <button class="edit-close" onclick="closeEdit()" aria-label="Fermer"><i class="fa-solid fa-xmark"></i></button>
      </div>
      <div class="edit-lines" id="editLines"></div>
      <div class="edit-add">
        <input list="menuItemsList" id="addItemInput" placeholder="Ajouter un article…" autocomplete="off" />
        <datalist id="menuItemsList"></datalist>
        <button class="edit-add-btn" onclick="addEditItem()" aria-label="Ajouter"><i class="fa-solid fa-plus"></i></button>
      </div>
      <div class="edit-foot">
        <span class="edit-total-label">Total <strong id="editTotal">0.00 DT</strong></span>
        <div class="edit-foot-actions">
          <button class="btn-cancel" onclick="closeEdit()">Annuler</button>
          <button class="btn-done" onclick="saveEdit()"><i class="fa-solid fa-floppy-disk"></i> Enregistrer</button>
        </div>
      </div>
    </div>
  </div>

  <script src="menu-data.js"></script>
  <script src="supabase.js"></script>
  <script src="pos-script.js"></script>
</body>
</html>
