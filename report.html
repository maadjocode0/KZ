<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <meta name="theme-color" content="#0d1117" />
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <link rel="apple-touch-icon" href="icon.svg" />
  <title>KZ | Rapport des ventes</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link rel="stylesheet" href="pos.css" />
  <link rel="stylesheet" href="report.css" />
</head>
<body class="pos-body">
  <div class="pos-shell">

    <header class="pos-topbar">
      <div class="pos-brand">
        <img src="logo-kz.png" alt="KZ Café Lounge" width="38" height="46" />
        <strong>KZ Café Lounge</strong>
      </div>
      <nav class="pos-right">
        <details class="pos-menu">
          <summary aria-haspopup="menu"><i class="fa-solid fa-chart-line"></i> <span>Rapport</span> <i class="fa-solid fa-chevron-down pos-menu-caret"></i></summary>
          <div class="pos-menu-panel">
            <a href="pos.html"><i class="fa-solid fa-table-columns"></i> POS</a>
            <a class="active" href="report.html" aria-current="page"><i class="fa-solid fa-chart-line"></i> Rapport</a>
            <a href="admin.html"><i class="fa-solid fa-sliders"></i> Menu</a>
            <a href="qr.html"><i class="fa-solid fa-qrcode"></i> QR</a>
          </div>
        </details>
        <button class="pos-logout" onclick="logout()" aria-label="Se déconnecter"><i class="fa-solid fa-right-from-bracket"></i></button>
      </nav>
    </header>

    <div class="report-controls">
      <div class="range-tabs" id="rangeTabs">
        <button class="filter-tab active" data-range="today" onclick="setRange('today')">Aujourd'hui</button>
        <button class="filter-tab" data-range="7" onclick="setRange('7')">7 jours</button>
        <button class="filter-tab" data-range="30" onclick="setRange('30')">30 jours</button>
        <button class="filter-tab" data-range="all" onclick="setRange('all')">Tout</button>
      </div>

      <div class="custom-range">
        <label>Du <input type="date" id="dateFrom" /></label>
        <label>au <input type="date" id="dateTo" /></label>
        <button class="filter-tab" id="applyRange" onclick="applyCustomRange()">Appliquer</button>
      </div>

      <div class="cat-filter">
        <button class="filter-tab cat-filter-btn" id="catFilterBtn" onclick="toggleCatFilter(event)">
          <i class="fa-solid fa-layer-group"></i>
          <span id="catFilterLabel">Toutes les catégories</span>
          <i class="fa-solid fa-chevron-down" style="font-size:0.7rem"></i>
        </button>
        <div class="cat-filter-panel" id="catFilterPanel" hidden>
          <div class="cat-filter-actions">
            <button type="button" onclick="setAllCats(true)">Tout</button>
            <button type="button" onclick="setAllCats(false)">Aucune</button>
          </div>
          <div class="cat-filter-list" id="catFilterList"></div>
        </div>
      </div>
    </div>

    <div id="reportRoot">
      <p class="empty-pos">Chargement…</p>
    </div>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <script src="menu-data.js"></script>
  <script src="supabase.js"></script>
  <script src="report-script.js"></script>
  <script src="staff-nav.js"></script>
</body>
</html>
